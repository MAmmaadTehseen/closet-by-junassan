<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Offline — Closet by Junassan</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#faf9f6;color:#0a0a0a;font-family:system-ui,-apple-system,sans-serif;
      padding:2rem;text-align:center
    }
    .logo{font-family:Georgia,serif;font-size:1.5rem;font-weight:700;letter-spacing:-.01em;margin-bottom:2.5rem;opacity:.2}
    h1{font-family:Georgia,serif;font-size:2rem;font-weight:600;line-height:1.15}
    p{margin-top:1rem;color:#6b6357;font-size:.875rem;max-width:24rem;line-height:1.6}
    button{
      margin-top:2rem;padding:.875rem 2rem;background:#0a0a0a;color:#faf9f6;border:none;
      border-radius:9999px;font-size:.7rem;font-weight:600;letter-spacing:.18em;
      text-transform:uppercase;cursor:pointer
    }
    button:hover{opacity:.9}
    .footer{margin-top:auto;padding-top:3rem;font-size:.65rem;color:#6b6357;letter-spacing:.18em;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="logo">Closet by Junassan</div>
  <h1>You're offline.</h1>
  <p>It looks like you've lost your internet connection. Check your Wi-Fi or mobile data and try again.</p>
  <button onclick="location.reload()">Try Again</button>
  <p class="footer">Cash on Delivery · All Over Pakistan</p>
</body>
</html>
